spring.application.name=IT hub for a client

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false

# OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend (FIXED property names)
app.frontend.url=${FRONTEND_PRIMARY_URL}
app.frontend.urls=${FRONTEND_ALLOWED_URLS}

# Supabase
supabase.storage.endpoint=https://njngmgfqghihmhuhglii.supabase.co/storage/v1/s3
supabase.storage.region=ap-south-1
supabase.storage.accessKey=${SUPABASE_STORAGE_ACCESS_KEY}
supabase.storage.secretKey=${SUPABASE_STORAGE_SECRET_KEY}
supabase.storage.bucket=SE
supabase.projectUrl=https://njngmgfqghihmhuhglii.storage.supabase.co

# Analytics
google.analytics.property-id=${GOOGLE_ANALYTICS_PROPERTY_ID}