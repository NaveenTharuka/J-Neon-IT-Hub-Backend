# Server configuration
server.port=${PORT:8080}
spring.application.name=IT hub for a client

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CRITICAL FIX: Disable prepared statement caching
spring.datasource.hikari.prepared-statement-cache-size=0
spring.datasource.hikari.prepared-statement-cache-sql-limit=0
spring.datasource.hikari.connection-init-sql=SELECT 1; DEALLOCATE ALL

# Connection pool settings - Optimized for Supabase
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.batch_size=0

# Flyway settings - WITH ALL FIXES
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.lock-retry-count=10
spring.flyway.connect-retries=5
# Critical: Disable transactional locks for PostgreSQL
spring.flyway.postgresql.transactional-lock=false
# Don't use Flyway's internal connection pool
spring.flyway.driver=org.postgresql.Driver

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL - with alias for your code
frontend.url=${FRONTEND_URL}
app.frontend.url=${frontend.url}

# Actuator — expose only health endpoint for Render HEALTHCHECK
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never