spring.application.name=IT hub for a client

# Database (FIXED: Added prepareThreshold=0 to prevent prepared statement errors)
spring.datasource.url=${DB_URL}?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (FIXED: Prevents connection state leakage)
spring.datasource.hikari.connection-init-sql=RESET ALL
spring.datasource.hikari.maxLifetime=300000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.connectionTimeout=30000

# Disable prepared statement caching at JDBC level (FIXED)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.unknownLength=2147483647
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=false

# JPA (FIXED: Disables statement caching in Hibernate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false

# Flyway (FIXED: Runs migrations on separate connection setup)
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.repair=true
spring.flyway.out-of-order=true

# OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend (FIXED property names)
app.frontend.url=${FRONTEND_PRIMARY_URL}
app.frontend.urls=${FRONTEND_ALLOWED_URLS}

# Supabase
supabase.storage.endpoint=https://njngmgfqghihmhuhglii.supabase.co/storage/v1/s3
supabase.storage.region=ap-south-1
supabase.storage.accessKey=${SUPABASE_STORAGE_ACCESS_KEY}
supabase.storage.secretKey=${SUPABASE_STORAGE_SECRET_KEY}
supabase.storage.bucket=SE
supabase.projectUrl=https://njngmgfqghihmhuhglii.storage.supabase.co

# Analytics
google.analytics.property-id=${GOOGLE_ANALYTICS_PROPERTY_ID}

# Additional Debugging (Optional - Remove in production)
logging.org.postgresql=WARN
logging.com.zaxxer.hikari=WARN
logging.org.hibernate.engine.jdbc=WARN